# =============================================================================
# Reality Intelligence Platform – GPU Overlay (docker-compose.gpu.yml)
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Overrides CPU worker services to use NVIDIA GPUs.
# Requires: NVIDIA Container Toolkit installed on host.
# =============================================================================

version: "3.9"

services:

  # ── GPU ML Worker (replaces CPU ml-worker) ───────────────────────────────
  celery-worker-ml:
    build:
      context: .
      dockerfile: docker/ml/Dockerfile.gpu
      target: production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    shm_size: "8gb"
    ulimits:
      memlock: -1
      stack: 67108864

  # ── GPU Reconstruction Worker ────────────────────────────────────────────
  celery-worker-recon:
    build:
      context: .
      dockerfile: docker/ml/Dockerfile.gpu
      target: production
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "all"
      COLMAP_VOCAB_TREE: /models/vocab_tree_flickr100K_words32K.bin
    volumes:
      - /models:/models:ro
      - colmap-workspace:/tmp/rip_sfm
    shm_size: "16gb"

  # ── NVIDIA Triton Inference Server ───────────────────────────────────────
  triton:
    image: nvcr.io/nvidia/tritonserver:23.12-py3
    restart: unless-stopped
    networks: [rip-net]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      tritonserver
        --model-repository=/models/triton
        --log-verbose=0
        --log-info=1
        --log-warning=1
        --log-error=1
        --strict-model-config=false
        --allow-http=true
        --allow-grpc=true
        --allow-metrics=true
        --http-port=8000
        --grpc-port=8001
        --metrics-port=8002
    volumes:
      - /models/triton:/models/triton:ro
    ports:
      - "8010:8000"   # Triton HTTP (avoid conflict with backend)
      - "8011:8001"   # Triton gRPC
      - "8012:8002"   # Triton metrics
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    shm_size: "4gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8002"
      - "prometheus.path=/metrics"

  # ── NVIDIA DCGM Exporter (GPU metrics for Prometheus) ───────────────────
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.0-3.2.0-ubuntu22.04
    restart: unless-stopped
    networks: [rip-net]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    cap_add: [SYS_ADMIN]
    ports:
      - "9400:9400"
    environment:
      DCGM_EXPORTER_LISTEN: ":9400"
      DCGM_EXPORTER_KUBERNETES: "false"
