# =============================================================================
# Reality Intelligence Platform – Pre-commit Configuration
# =============================================================================
# Install: pre-commit install
# Run all: pre-commit run --all-files
# =============================================================================

repos:

  # ── Code formatting ──────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]
        files: ^(backend|ml|tests)/

  # ── Linting & auto-fixes ─────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend|ml|tests)/

  # ── Type checking ─────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary]
        files: ^backend/app/
        additional_dependencies:
          - types-requests
          - types-redis
          - pydantic>=2.0

  # ── General file hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=5000]     # Block files > 5MB
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch=main, --branch=production]

  # ── Secret detection ─────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: (\.lock|requirements.*\.txt|\.env\.example)$

  # ── Security scanning ─────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: [-ll, -r]            # Low level and above; recursive
        files: ^backend/app/
        exclude: tests/

  # ── Frontend (ESLint + Prettier) ─────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint (frontend)
        language: node
        entry: bash -c 'cd frontend && npm run lint'
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: prettier
        name: Prettier (frontend)
        language: node
        entry: bash -c 'cd frontend && npm run format:check'
        files: ^frontend/src/.*\.(ts|tsx|css|json)$
        pass_filenames: false

  # ── Docker lint ───────────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3013]

  # ── Kubernetes YAML validation ────────────────────────────────────────────────
  - repo: https://github.com/instrumenta/kubeval
    rev: v0.16.1
    hooks:
      - id: kubeval
        files: ^kubernetes/.*\.yaml$
        args: [--ignore-missing-schemas]
