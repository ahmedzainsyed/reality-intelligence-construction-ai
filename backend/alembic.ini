# =============================================================================
# Alembic Configuration – Reality Intelligence Platform
# =============================================================================
# Run migrations: alembic upgrade head
# Create migration: alembic revision --autogenerate -m "description"
# Rollback: alembic downgrade -1
# Show history: alembic history --verbose
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .

# Database URL is overridden in env.py from app.core.config.settings
# This is a fallback for offline/test use only
sqlalchemy.url = postgresql://postgres:password@localhost:5432/rip_db

# Version file naming
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# UTC timestamps in migration files
timezone = UTC

# Truncate slug at 40 chars
truncate_slug_length = 40

# Source encoding
source_encoding = utf-8

# =============================================================================
# Logging
# =============================================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
