# =============================================================================
# Reality Intelligence Platform – NGINX Production Config
# =============================================================================
# Handles:
#   - HTTPS termination
#   - HTTP → HTTPS redirect
#   - API reverse proxy with rate limiting
#   - Static frontend serving
#   - WebSocket proxy for live updates
#   - MinIO presigned URL proxying
#   - Gzip compression
#   - Security headers

worker_processes auto;
worker_rlimit_nofile 65535;
pid /tmp/nginx.pid;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75;
    keepalive_requests 1000;
    reset_timedout_connection on;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/wasm image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=100r/m;
    limit_req_zone  $binary_remote_addr zone=upload:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_req_status 429;

    # ── Client settings ───────────────────────────────────────────────────────
    client_max_body_size    5120m;    # 5 GB – chunked video uploads
    client_body_timeout     300s;
    client_header_timeout   30s;
    client_body_buffer_size 128k;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream backend_api {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:80;
        keepalive 16;
    }

    upstream minio_storage {
        server minio:9000;
        keepalive 8;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${SERVER_NAME:-localhost};

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Security headers ───────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"  always;
        add_header X-Content-Type-Options    "nosniff"     always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Request-ID              $request_id always;

        # ── API proxy ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_conn addr 20;

            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            proxy_set_header   Connection        "";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering    off;

            # CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "$http_origin";
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID";
                add_header Access-Control-Max-Age       3600;
                add_header Content-Length 0;
                return 204;
            }
        }

        # Auth endpoints – stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Upload endpoints – large body, slower rate
        location /api/v1/uploads/ {
            limit_req zone=upload burst=5;
            client_max_body_size 5120m;
            proxy_pass         http://backend_api;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_request_buffering off;
        }

        # ── WebSocket for real-time updates ────────────────────────────────────
        location /ws/ {
            proxy_pass          http://backend_api;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        # ── Metrics endpoint (internal only) ───────────────────────────────────
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 127.0.0.1;
            deny all;
            proxy_pass http://backend_api;
        }

        location /health {
            proxy_pass http://backend_api;
            access_log off;
        }

        # ── MinIO presigned URL proxy ──────────────────────────────────────────
        location /storage/ {
            internal;  # Only accessible via X-Accel-Redirect
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass http://minio_storage;
            proxy_set_header Host minio:9000;
        }

        # ── React frontend (SPA) ───────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_app;
            proxy_set_header   Host $host;
            proxy_cache_bypass $http_upgrade;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend_app;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # SPA fallback
            try_files $uri $uri/ @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://frontend_app;
        }

        # ── Docs (API Swagger) ─────────────────────────────────────────────────
        location /docs {
            proxy_pass http://backend_api;
        }

        location /openapi.json {
            proxy_pass http://backend_api;
            add_header Cache-Control "no-cache";
        }
    }
}
