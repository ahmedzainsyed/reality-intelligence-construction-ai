# =============================================================================
# YOLOv8-L Construction Detection – Training Configuration
# =============================================================================

# Model
model: yolov8l.pt
task: detect

# Dataset
data: configs/construction_detection.yaml
imgsz: 1280

# Training
epochs: 300
patience: 50
batch: 16
workers: 8
cache: ram                   # Cache dataset in RAM for faster epochs

# Optimiser
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 5.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# Augmentation (tuned for construction site diversity)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0               # Rotation – drone footage at angles
translate: 0.1
scale: 0.5
shear: 5.0
perspective: 0.0003
flipud: 0.05                # Occasional upside-down (unusual drone angles)
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
copy_paste: 0.15            # Good for small workers and rebar
auto_augment: randaugment
erasing: 0.4

# Loss weights
box: 7.5
cls: 0.5
dfl: 1.5

# Precision
half: true                   # FP16 training

# Output
project: outputs/detection
save: true
save_period: 10
plots: true
val: true
exist_ok: true

# Logging
verbose: true
